name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Required: Set these in GitHub Actions > Variables
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  ECR_REPOSITORY_WEB: ${{ vars.ECR_REPOSITORY_WEB }}
  ECR_REPOSITORY_BACKEND: ${{ vars.ECR_REPOSITORY_BACKEND }}
  ECS_CLUSTER: ${{ vars.ECS_CLUSTER }}
  ECS_SERVICE_WEB: ${{ vars.ECS_SERVICE_WEB }}
  ECS_SERVICE_BACKEND: ${{ vars.ECS_SERVICE_BACKEND }}
  ECS_TASK_DEFINITION_WEB: ${{ vars.ECS_TASK_DEFINITION_WEB }}
  ECS_TASK_DEFINITION_BACKEND: ${{ vars.ECS_TASK_DEFINITION_BACKEND }}

  # Image tag (use commit SHA for immutable deployments)
  IMAGE_TAG: ${{ github.sha }}

  # Required: Set these in GitHub Actions > Secrets
  # AWS_ACCESS_KEY_ID: (your AWS access key)
  # AWS_SECRET_ACCESS_KEY: (your AWS secret key)

jobs:
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push Web image to ECR
        id: build-web
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          LATEST_TAG: latest
        run: |
          echo "=========================================="
          echo "Building Web Docker Image"
          echo "=========================================="
          echo "Repository: $ECR_REGISTRY/$ECR_REPOSITORY_WEB"
          echo "Tag: $IMAGE_TAG"
          echo ""

          docker buildx build \
            --file apps/web/Dockerfile \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$LATEST_TAG \
            .

          # Update cache for next run
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

          echo "✓ Web image pushed successfully"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo ""

      - name: Build and push Backend image to ECR
        id: build-backend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          LATEST_TAG: latest
        run: |
          echo "=========================================="
          echo "Building Backend Docker Image"
          echo "=========================================="
          echo "Repository: $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND"
          echo "Tag: $IMAGE_TAG"
          echo ""

          docker buildx build \
            --file apps/backend/Dockerfile \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --push \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG \
            --tag $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$LATEST_TAG \
            .

          # Update cache for next run
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

          echo "✓ Backend image pushed successfully"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo ""

      - name: Update Web task definition
        id: update-task-def-web
        run: |
          echo "=========================================="
          echo "Updating Web Task Definition"
          echo "=========================================="

          # Substitute variables in task definition template
          export PROJECT_NAME AWS_ACCOUNT_ID AWS_REGION IMAGE_TAG
          export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          envsubst < aws/ecs/task-definition-web.json > /tmp/task-def-web-updated.json

          # Register new task definition revision
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def-web-updated.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "✓ Web task definition updated: $TASK_DEF_ARN"
          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT
          echo ""

      - name: Deploy Web to ECS
        id: deploy-web
        run: |
          echo "=========================================="
          echo "Deploying Web Service"
          echo "=========================================="

          # Update service with new task definition
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_WEB \
            --task-definition ${{ steps.update-task-def-web.outputs.task_def_arn }} \
            --force-new-deployment

          echo "✓ Web service deployment started"
          echo "Waiting for web service to stabilize..."

          # Wait for service to stabilize
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE_WEB

          echo "✓ Web service is stable"
          echo ""

      - name: Update Backend task definition
        id: update-task-def-backend
        run: |
          echo "=========================================="
          echo "Updating Backend Task Definition"
          echo "=========================================="

          # Substitute variables in task definition template
          export PROJECT_NAME AWS_ACCOUNT_ID AWS_REGION IMAGE_TAG
          export AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          envsubst < aws/ecs/task-definition-backend.json > /tmp/task-def-backend-updated.json

          # Register new task definition revision
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def-backend-updated.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "✓ Backend task definition updated: $TASK_DEF_ARN"
          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT
          echo ""

      - name: Deploy Backend to ECS
        id: deploy-backend
        run: |
          echo "=========================================="
          echo "Deploying Backend Service"
          echo "=========================================="

          # Update service with new task definition
          aws ecs update-service \
            --cluster $ECS_CLUSTER \
            --service $ECS_SERVICE_BACKEND \
            --task-definition ${{ steps.update-task-def-backend.outputs.task_def_arn }} \
            --force-new-deployment

          echo "✓ Backend service deployment started"
          echo "Waiting for backend service to stabilize..."

          # Wait for service to stabilize
          aws ecs wait services-stable \
            --cluster $ECS_CLUSTER \
            --services $ECS_SERVICE_BACKEND

          echo "✓ Backend service is stable"
          echo ""

      - name: Deployment summary
        run: |
          echo "=========================================="
          echo "Deployment completed successfully!"
          echo "=========================================="
          echo "Project: ${{ env.PROJECT_NAME }}"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Commit SHA: ${{ github.sha }}"
          echo ""
          echo "Web Image: ${{ steps.build-web.outputs.image }}"
          echo "Web Task Definition: ${{ steps.update-task-def-web.outputs.task_def_arn }}"
          echo "Web Service: ${{ env.ECS_CLUSTER }}/${{ env.ECS_SERVICE_WEB }}"
          echo ""
          echo "Backend Image: ${{ steps.build-backend.outputs.image }}"
          echo "Backend Task Definition: ${{ steps.update-task-def-backend.outputs.task_def_arn }}"
          echo "Backend Service: ${{ env.ECS_CLUSTER }}/${{ env.ECS_SERVICE_BACKEND }}"
          echo "=========================================="

          # Set output for easy access
          echo "web_image_url=${{ steps.build-web.outputs.image }}" >> $GITHUB_ENV
          echo "backend_image_url=${{ steps.build-backend.outputs.image }}" >> $GITHUB_ENV

      - name: Comment deployment status on PR (if applicable)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Deployment successful! 🚀

              **Commit**: \`${{ github.sha }}\`

              **Web**:
              - Image: \`${{ steps.build-web.outputs.image }}\`
              - Task Definition: \`${{ steps.update-task-def-web.outputs.task_def_arn }}\`

              **Backend**:
              - Image: \`${{ steps.build-backend.outputs.image }}\`
              - Task Definition: \`${{ steps.update-task-def-backend.outputs.task_def_arn }}\`

              The deployment is now live in ECS!`
            })
