name: Infrastructure Setup

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - "staging"
          - "production"
      create_vpc:
        description: "Create default VPC and subnets (if not provided)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

# Prevent multiple infrastructure runs at once
concurrency:
  group: infrastructure-${{ github.event.inputs.environment }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  PROJECT_NAME: ${{ vars.PROJECT_NAME }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  ENVIRONMENT: ${{ github.event.inputs.environment }}
  ENV_SUFFIX: ${{ github.event.inputs.environment == 'staging' && '-staging' || '' }}

jobs:
  setup-aws-infrastructure:
    name: Setup AWS Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create VPC
        id: vpc
        run: |
          echo "=========================================="
          echo "Setting up VPC and Networking"
          echo "Environment: ${{ env.ENVIRONMENT }}"
          echo "=========================================="

          if [ -n "${{ vars.VPC_ID }}" ]; then
            echo "Using existing VPC: ${{ vars.VPC_ID }}"
            echo "vpc_id=${{ vars.VPC_ID }}" >> $GITHUB_OUTPUT

            if [ -n "${{ vars.SUBNET_IDS }}" ]; then
              echo "Using existing subnets: ${{ vars.SUBNET_IDS }}"
              echo "subnet_ids=${{ vars.SUBNET_IDS }}" >> $GITHUB_OUTPUT
            else
              echo "Error: If VPC_ID is provided, SUBNET_IDS must also be provided"
              exit 1
            fi
          elif [ "${{ github.event.inputs.create_vpc }}" = "true" ]; then
            echo "Creating default VPC..."
            VPC_ID=$(aws ec2 create-vpc \
              --cidr-block 10.0.0.0/16 \
              --tag-specifications "ResourceType=vpc,Tags=[{Key=Name,Value=${PROJECT_NAME}${ENV_SUFFIX}-vpc}]" \
              --query 'Vpc.VpcId' \
              --output text)
            echo "✓ VPC created: $VPC_ID"
            echo "vpc_id=$VPC_ID" >> $GITHUB_OUTPUT

            # Enable DNS support
            aws ec2 modify-vpc-attribute --vpc-id $VPC_ID --enable-dns-support '{"Value": true}'
            aws ec2 modify-vpc-attribute --vpc-id $VPC_ID --enable-dns-hostnames '{"Value": true}'

            # Create Internet Gateway
            echo "Creating Internet Gateway..."
            IGW_ID=$(aws ec2 create-internet-gateway \
              --tag-specifications "ResourceType=internet-gateway,Tags=[{Key=Name,Value=${PROJECT_NAME}${ENV_SUFFIX}-igw}]" \
              --query 'InternetGateway.InternetGatewayId' \
              --output text)
            aws ec2 attach-internet-gateway --vpc-id $VPC_ID --internet-gateway-id $IGW_ID
            echo "✓ Internet Gateway created: $IGW_ID"

            # Create subnets
            echo "Creating public subnets..."
            SUBNET1_ID=$(aws ec2 create-subnet \
              --vpc-id $VPC_ID \
              --cidr-block 10.0.1.0/24 \
              --availability-zone ${AWS_REGION}a \
              --tag-specifications "ResourceType=subnet,Tags=[{Key=Name,Value=${PROJECT_NAME}${ENV_SUFFIX}-subnet-1a}]" \
              --query 'Subnet.SubnetId' \
              --output text)

            SUBNET2_ID=$(aws ec2 create-subnet \
              --vpc-id $VPC_ID \
              --cidr-block 10.0.2.0/24 \
              --availability-zone ${AWS_REGION}b \
              --tag-specifications "ResourceType=subnet,Tags=[{Key=Name,Value=${PROJECT_NAME}${ENV_SUFFIX}-subnet-1b}]" \
              --query 'Subnet.SubnetId' \
              --output text)

            echo "✓ Subnet 1a created: $SUBNET1_ID"
            echo "✓ Subnet 1b created: $SUBNET2_ID"
            echo "subnet_ids=$SUBNET1_ID,$SUBNET2_ID" >> $GITHUB_OUTPUT

            # Create route table
            echo "Creating route table..."
            RTB_ID=$(aws ec2 create-route-table \
              --vpc-id $VPC_ID \
              --tag-specifications "ResourceType=route-table,Tags=[{Key=Name,Value=${PROJECT_NAME}${ENV_SUFFIX}-rtb}]" \
              --query 'RouteTable.RouteTableId' \
              --output text)

            aws ec2 create-route \
              --route-table-id $RTB_ID \
              --destination-cidr-block 0.0.0.0/0 \
              --gateway-id $IGW_ID > /dev/null

            # Associate subnets with route table
            aws ec2 associate-route-table --route-table-id $RTB_ID --subnet-id $SUBNET1_ID > /dev/null
            aws ec2 associate-route-table --route-table-id $RTB_ID --subnet-id $SUBNET2_ID > /dev/null

            echo "✓ Route table created and associated"
          else
            echo "Error: VPC setup failed. Either provide VPC_ID and SUBNET_IDS, or enable VPC creation"
            exit 1
          fi

          echo ""

      - name: Create Security Groups
        id: security-groups
        run: |
          echo "=========================================="
          echo "Creating Security Groups"
          echo "=========================================="

          VPC_ID="${{ steps.vpc.outputs.vpc_id }}"

          # Create ALB security group
          ALB_SG_ID=$(aws ec2 create-security-group \
            --group-name ${PROJECT_NAME}${ENV_SUFFIX}-alb-sg \
            --description "Security group for Application Load Balancer" \
            --vpc-id $VPC_ID \
            --tag-specifications "ResourceType=security-group,Tags=[{Key=Name,Value=${PROJECT_NAME}${ENV_SUFFIX}-alb-sg}]" \
            --query 'GroupId' \
            --output text)

          aws ec2 authorize-security-group-ingress \
            --group-id $ALB_SG_ID \
            --protocol tcp \
            --port 80 \
            --cidr 0.0.0.0/0 > /dev/null

          aws ec2 authorize-security-group-ingress \
            --group-id $ALB_SG_ID \
            --protocol tcp \
            --port 443 \
            --cidr 0.0.0.0/0 > /dev/null

          echo "✓ ALB security group created: $ALB_SG_ID"

          # Create ECS security group
          ECS_SG_ID=$(aws ec2 create-security-group \
            --group-name ${PROJECT_NAME}${ENV_SUFFIX}-ecs-sg \
            --description "Security group for ECS tasks" \
            --vpc-id $VPC_ID \
            --tag-specifications "ResourceType=security-group,Tags=[{Key=Name,Value=${PROJECT_NAME}${ENV_SUFFIX}-ecs-sg}]" \
            --query 'GroupId' \
            --output text)

          aws ec2 authorize-security-group-ingress \
            --group-id $ECS_SG_ID \
            --protocol tcp \
            --port 3000-3001 \
            --source-group $ALB_SG_ID > /dev/null

          echo "✓ ECS security group created: $ECS_SG_ID"

          echo "alb_sg_id=$ALB_SG_ID" >> $GITHUB_OUTPUT
          echo "ecs_sg_id=$ECS_SG_ID" >> $GITHUB_OUTPUT
          echo ""

      - name: Create IAM Roles
        id: iam-roles
        run: |
          echo "=========================================="
          echo "Creating IAM Roles"
          echo "=========================================="

          # Create task execution role trust policy
          cat > /tmp/trust-policy.json <<'EOF'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {
                  "Service": "ecs-tasks.amazonaws.com"
                },
                "Action": "sts:AssumeRole"
              }
            ]
          }
          EOF

          # Check if role exists
          if aws iam get-role --role-name ecsTaskExecutionRole --region ${AWS_REGION} 2>/dev/null; then
            echo "✓ Task execution role already exists"
            TASK_EXECUTION_ROLE_ARN=$(aws iam get-role --role-name ecsTaskExecutionRole --query 'Role.Arn' --output text)
          else
            # Create task execution role
            TASK_EXECUTION_ROLE_ARN=$(aws iam create-role \
              --role-name ecsTaskExecutionRole \
              --assume-role-policy-document file:///tmp/trust-policy.json \
              --description "ECS task execution role" \
              --query 'Role.Arn' \
              --output text)

            # Attach AmazonECSTaskExecutionRolePolicy
            aws iam attach-role-policy \
              --role-name ecsTaskExecutionRole \
              --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

            # Add additional permissions for Secrets Manager
            aws iam put-role-policy \
              --role-name ecsTaskExecutionRole \
              --policy-name SecretsManagerAccess \
              --policy-document '{
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Action": [
                      "secretsmanager:GetSecretValue",
                      "secretsmanager:DescribeSecret"
                    ],
                    "Resource": "arn:aws:secretsmanager:'${AWS_REGION}':'${AWS_ACCOUNT_ID}':secret:'${PROJECT_NAME}'/*"
                  }
                ]
              }'

            echo "✓ Task execution role created"
          fi

          echo "task_execution_role_arn=$TASK_EXECUTION_ROLE_ARN" >> $GITHUB_OUTPUT
          echo ""

      - name: Create ECR Repositories
        id: ecr
        run: |
          echo "=========================================="
          echo "Creating ECR Repositories"
          echo "=========================================="

          # Create web repository
          if aws ecr describe-repositories --repository-names ${PROJECT_NAME}-web${ENV_SUFFIX} --region ${AWS_REGION} 2>/dev/null; then
            echo "✓ Web ECR repository already exists"
          else
            aws ecr create-repository \
              --repository-name ${PROJECT_NAME}-web${ENV_SUFFIX} \
              --region ${AWS_REGION} \
              --image-scanning-configuration scanOnPush=true \
              --tag-mutability MUTABLE > /dev/null
            echo "✓ Web ECR repository created"
          fi

          # Create backend repository
          if aws ecr describe-repositories --repository-names ${PROJECT_NAME}-backend${ENV_SUFFIX} --region ${AWS_REGION} 2>/dev/null; then
            echo "✓ Backend ECR repository already exists"
          else
            aws ecr create-repository \
              --repository-name ${PROJECT_NAME}-backend${ENV_SUFFIX} \
              --region ${AWS_REGION} \
              --image-scanning-configuration scanOnPush=true \
              --tag-mutability MUTABLE > /dev/null
            echo "✓ Backend ECR repository created"
          fi

          echo "ecr_repo_web=${PROJECT_NAME}-web${ENV_SUFFIX}" >> $GITHUB_OUTPUT
          echo "ecr_repo_backend=${PROJECT_NAME}-backend${ENV_SUFFIX}" >> $GITHUB_OUTPUT
          echo ""

      - name: Create CloudWatch Log Groups
        id: logs
        run: |
          echo "=========================================="
          echo "Creating CloudWatch Log Groups"
          echo "=========================================="

          # Create web log group
          if aws logs describe-log-groups --log-group-name-prefix /ecs/${PROJECT_NAME}-web${ENV_SUFFIX} --region ${AWS_REGION} 2>/dev/null | grep -q "logGroupName"; then
            echo "✓ Web log group already exists"
          else
            aws logs create-log-group \
              --log-group-name /ecs/${PROJECT_NAME}-web${ENV_SUFFIX} \
              --region ${AWS_REGION}
            aws logs put-retention-policy \
              --log-group-name /ecs/${PROJECT_NAME}-web${ENV_SUFFIX} \
              --retention-in-days 7 \
              --region ${AWS_REGION}
            echo "✓ Web log group created"
          fi

          # Create backend log group
          if aws logs describe-log-groups --log-group-name-prefix /ecs/${PROJECT_NAME}-backend${ENV_SUFFIX} --region ${AWS_REGION} 2>/dev/null | grep -q "logGroupName"; then
            echo "✓ Backend log group already exists"
          else
            aws logs create-log-group \
              --log-group-name /ecs/${PROJECT_NAME}-backend${ENV_SUFFIX} \
              --region ${AWS_REGION}
            aws logs put-retention-policy \
              --log-group-name /ecs/${PROJECT_NAME}-backend${ENV_SUFFIX} \
              --retention-in-days 7 \
              --region ${AWS_REGION}
            echo "✓ Backend log group created"
          fi

          echo "log_group_web=/ecs/${PROJECT_NAME}-web${ENV_SUFFIX}" >> $GITHUB_OUTPUT
          echo "log_group_backend=/ecs/${PROJECT_NAME}-backend${ENV_SUFFIX}" >> $GITHUB_OUTPUT
          echo ""

      - name: Create Application Load Balancer
        id: alb
        run: |
          echo "=========================================="
          echo "Creating Application Load Balancer"
          echo "=========================================="

          VPC_ID="${{ steps.vpc.outputs.vpc_id }}"
          SUBNETS="${{ steps.vpc.outputs.subnet_ids }}"
          ALB_SG_ID="${{ steps.security-groups.outputs.alb_sg_id }}"

          # Convert comma-separated subnets to array
          IFS=',' read -ra SUBNET_ARRAY <<< "$SUBNETS"

          # Create ALB
          ALB_ARN=$(aws elbv2 create-load-balancer \
            --name ${PROJECT_NAME}${ENV_SUFFIX}-alb \
            --subnets ${SUBNET_ARRAY[0]} ${SUBNET_ARRAY[1]} \
            --security-groups $ALB_SG_ID \
            --scheme internet-facing \
            --type application \
            --tags Key=Name,Value=${PROJECT_NAME}${ENV_SUFFIX}-alb \
            --query 'LoadBalancers[0].LoadBalancerArn' \
            --output text)

          echo "✓ ALB created: $ALB_ARN"

          # Wait for ALB to be active
          echo "Waiting for ALB to become active..."
          aws elbv2 wait load-balancer-available --load-balancer-arns $ALB_ARN

          # Get ALB DNS name
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --load-balancer-arns $ALB_ARN \
            --query 'LoadBalancers[0].DNSName' \
            --output text)

          echo "✓ ALB is active at: http://$ALB_DNS"

          echo "alb_arn=$ALB_ARN" >> $GITHUB_OUTPUT
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT

          # Create target groups
          WEB_TG_ARN=$(aws elbv2 create-target-group \
            --name ${PROJECT_NAME}${ENV_SUFFIX}-web-tg \
            --port 3001 \
            --protocol HTTP \
            --vpc-id $VPC_ID \
            --target-type ip \
            --health-check-path / \
            --health-check-interval-seconds 30 \
            --health-check-timeout-seconds 5 \
            --healthy-threshold-count 3 \
            --unhealthy-threshold-count 2 \
            --query 'TargetGroups[0].TargetGroupArn' \
            --output text)

          BACKEND_TG_ARN=$(aws elbv2 create-target-group \
            --name ${PROJECT_NAME}${ENV_SUFFIX}-backend-tg \
            --port 3000 \
            --protocol HTTP \
            --vpc-id $VPC_ID \
            --target-type ip \
            --health-check-path /health \
            --health-check-interval-seconds 30 \
            --health-check-timeout-seconds 5 \
            --healthy-threshold-count 3 \
            --unhealthy-threshold-count 2 \
            --query 'TargetGroups[0].TargetGroupArn' \
            --output text)

          echo "✓ Web target group created: $WEB_TG_ARN"
          echo "✓ Backend target group created: $BACKEND_TG_ARN"

          echo "web_tg_arn=$WEB_TG_ARN" >> $GITHUB_OUTPUT
          echo "backend_tg_arn=$BACKEND_TG_ARN" >> $GITHUB_OUTPUT

          # Create listener
          LISTENER_ARN=$(aws elbv2 create-listener \
            --load-balancer-arn $ALB_ARN \
            --protocol HTTP \
            --port 80 \
            --default-actions Type=forward,TargetGroupArn=$WEB_TG_ARN \
            --query 'Listeners[0].ListenerArn' \
            --output text)

          echo "✓ Listener created: $LISTENER_ARN"
          echo ""

      - name: Create ECS Cluster
        id: ecs
        run: |
          echo "=========================================="
          echo "Creating ECS Cluster"
          echo "=========================================="

          # Create cluster
          CLUSTER_ARN=$(aws ecs create-cluster \
            --cluster-name ${PROJECT_NAME}${ENV_SUFFIX}-cluster \
            --tags Key=Name,Value=${PROJECT_NAME}${ENV_SUFFIX}-cluster \
            --query 'cluster.clusterArn' \
            --output text)

          echo "✓ ECS cluster created: $CLUSTER_ARN"

          echo "cluster_arn=$CLUSTER_ARN" >> $GITHUB_OUTPUT
          echo "cluster_name=${PROJECT_NAME}${ENV_SUFFIX}-cluster" >> $GITHUB_OUTPUT
          echo ""

      - name: Register Task Definitions
        id: task-definitions
        run: |
          echo "=========================================="
          echo "Registering Task Definitions"
          echo "Environment: ${{ env.ENVIRONMENT }}"
          echo "=========================================="

          # Substitute variables in task definitions
          export PROJECT_NAME AWS_ACCOUNT_ID AWS_REGION IMAGE_TAG="latest"

          # Select task definition template based on environment
          TASK_DEF_WEB_TEMPLATE="aws/ecs/task-definition-web${ENV_SUFFIX}.json"
          TASK_DEF_BACKEND_TEMPLATE="aws/ecs/task-definition-backend${ENV_SUFFIX}.json"

          # Register web task definition
          envsubst < $TASK_DEF_WEB_TEMPLATE > /tmp/task-def-web.json
          WEB_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def-web.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "✓ Web task definition registered: $WEB_TASK_DEF_ARN"

          # Register backend task definition
          envsubst < $TASK_DEF_BACKEND_TEMPLATE > /tmp/task-def-backend.json
          BACKEND_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file:///tmp/task-def-backend.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "✓ Backend task definition registered: $BACKEND_TASK_DEF_ARN"

          echo "web_task_def_arn=$WEB_TASK_DEF_ARN" >> $GITHUB_OUTPUT
          echo "backend_task_def_arn=$BACKEND_TASK_DEF_ARN" >> $GITHUB_OUTPUT
          echo ""

      - name: Create ECS Services
        id: services
        run: |
          echo "=========================================="
          echo "Creating ECS Services"
          echo "=========================================="

          CLUSTER_NAME="${{ steps.ecs.outputs.cluster_name }}"
          SUBNETS="${{ steps.vpc.outputs.subnet_ids }}"
          ECS_SG_ID="${{ steps.security-groups.outputs.ecs_sg_id }}"
          WEB_TG_ARN="${{ steps.alb.outputs.web_tg_arn }}"
          BACKEND_TG_ARN="${{ steps.alb.outputs.backend_tg_arn }}"
          WEB_TASK_DEF="${{ steps.task-definitions.outputs.web_task_def_arn }}"
          BACKEND_TASK_DEF="${{ steps.task-definitions.outputs.backend_task_def_arn }}"

          # Convert comma-separated subnets to array
          IFS=',' read -ra SUBNET_ARRAY <<< "$SUBNETS"

          # Create web service
          echo "Creating web service..."
          aws ecs create-service \
            --cluster $CLUSTER_NAME \
            --service-name ${PROJECT_NAME}${ENV_SUFFIX}-web-service \
            --task-definition $WEB_TASK_DEF \
            --desired-count 1 \
            --launch-type FARGATE \
            --platform-version LATEST \
            --network-configuration "awsvpcConfiguration={subnets=${SUBNET_ARRAY[0]},securityGroups=$ECS_SG_ID,assignPublicIp=ENABLED}" \
            --load-balancers "targetGroupArn=$WEB_TG_ARN,containerName=web,containerPort=3001" \
            --deployment-controller type=ECS \
            --health-check-grace-period-seconds 60 \
            --tags Key=Name,Value=${PROJECT_NAME}${ENV_SUFFIX}-web-service > /dev/null

          echo "✓ Web service created"

          # Create backend service
          echo "Creating backend service..."
          aws ecs create-service \
            --cluster $CLUSTER_NAME \
            --service-name ${PROJECT_NAME}${ENV_SUFFIX}-backend-service \
            --task-definition $BACKEND_TASK_DEF \
            --desired-count 1 \
            --launch-type FARGATE \
            --platform-version LATEST \
            --network-configuration "awsvpcConfiguration={subnets=${SUBNET_ARRAY[0]},securityGroups=$ECS_SG_ID,assignPublicIp=ENABLED}" \
            --tags Key=Name,Value=${PROJECT_NAME}${ENV_SUFFIX}-backend-service \
            --health-check-grace-period-seconds 60 > /dev/null

          echo "✓ Backend service created"
          echo ""

      - name: Wait for Services to Stabilize
        run: |
          echo "=========================================="
          echo "Waiting for Services to Stabilize"
          echo "=========================================="

          CLUSTER_NAME="${{ steps.ecs.outputs.cluster_name }}"

          echo "Waiting for web service..."
          aws ecs wait services-stable \
            --cluster $CLUSTER_NAME \
            --services ${PROJECT_NAME}${ENV_SUFFIX}-web-service

          echo "✓ Web service is stable"

          echo "Waiting for backend service..."
          aws ecs wait services-stable \
            --cluster $CLUSTER_NAME \
            --services ${PROJECT_NAME}${ENV_SUFFIX}-backend-service

          echo "✓ Backend service is stable"
          echo ""

      - name: Output Summary
        run: |
          echo "=========================================="
          echo "Infrastructure Setup Complete!"
          echo "=========================================="
          echo "Environment: ${{ env.ENVIRONMENT }}"
          echo "Project: ${{ env.PROJECT_NAME }}"
          echo "Region: ${{ env.AWS_REGION }}"
          echo "Account ID: ${{ env.AWS_ACCOUNT_ID }}"
          echo ""
          echo "VPC ID: ${{ steps.vpc.outputs.vpc_id }}"
          echo "Subnets: ${{ steps.vpc.outputs.subnet_ids }}"
          echo "ALB DNS: ${{ steps.alb.outputs.alb_dns }}"
          echo "ECS Cluster: ${{ steps.ecs.outputs.cluster_name }}"
          echo "ECR Repositories:"
          echo "  - ${{ steps.ecr.outputs.ecr_repo_web }}"
          echo "  - ${{ steps.ecr.outputs.ecr_repo_backend }}"
          echo ""
          echo "Next Steps:"
          if [ "${{ env.ENVIRONMENT }}" = "staging" ]; then
            echo "1. Update your GitHub Variables with these staging values:"
            echo "   - ECR_REPOSITORY_WEB_STAGING=${{ steps.ecr.outputs.ecr_repo_web }}"
            echo "   - ECR_REPOSITORY_BACKEND_STAGING=${{ steps.ecr.outputs.ecr_repo_backend }}"
            echo "   - ECS_CLUSTER_STAGING=${{ steps.ecs.outputs.cluster_name }}"
            echo "   - ECS_SERVICE_WEB_STAGING=${{ steps.ecs.outputs.cluster_name }}-web-service"
            echo "   - ECS_SERVICE_BACKEND_STAGING=${{ steps.ecs.outputs.cluster_name }}-backend-service"
            echo "   - ECS_TASK_DEFINITION_WEB_STAGING=${{ steps.ecr.outputs.ecr_repo_web }}"
            echo "   - ECS_TASK_DEFINITION_BACKEND_STAGING=${{ steps.ecr.outputs.ecr_repo_backend }}"
          else
            echo "1. Update your GitHub Variables with these production values:"
            echo "   - ECR_REPOSITORY_WEB=${{ steps.ecr.outputs.ecr_repo_web }}"
            echo "   - ECR_REPOSITORY_BACKEND=${{ steps.ecr.outputs.ecr_repo_backend }}"
            echo "   - ECS_CLUSTER=${{ steps.ecs.outputs.cluster_name }}"
            echo "   - ECS_SERVICE_WEB=${{ steps.ecs.outputs.cluster_name }}-web-service"
            echo "   - ECS_SERVICE_BACKEND=${{ steps.ecs.outputs.cluster_name }}-backend-service"
            echo "   - ECS_TASK_DEFINITION_WEB=${{ steps.ecr.outputs.ecr_repo_web }}"
            echo "   - ECS_TASK_DEFINITION_BACKEND=${{ steps.ecr.outputs.ecr_repo_backend }}"
          fi
          echo ""
          echo "2. Run the deployment workflow to deploy your applications"
          echo "=========================================="
